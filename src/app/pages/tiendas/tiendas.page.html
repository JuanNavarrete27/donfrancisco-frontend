<main class="shops" [style.--sx.%]="sx" [style.--sy.%]="sy">

  <div class="bg" aria-hidden="true">
    <div class="spot"></div>
    <div class="lines"></div>
    <div class="radar"></div>
    <div class="grain"></div>
    <div class="scan"></div>
  </div>

  <header class="top">
    <a class="back" routerLink="/locales">← Volver</a>
    <span class="badge">Tiendas</span>
  </header>

  <section class="hero">
    <div class="hero__text">
      <h1 class="title">Puntos de venta premium</h1>
      <p class="subtitle">
        Descubre nuestras tiendas seleccionadas: vinoteca, pescados, autoservicio, carnes y productos regionales.
      </p>
    </div>
  </section>

  <!-- Data State -->
  <section class="list" aria-label="Puntos de venta">
    <button
      #cardEl
      class="card"
      type="button"
      *ngFor="let p of puntos; let i = index"
      (click)="abrir(p)"
    >
      <div class="card__fx" aria-hidden="true"></div>
      <div class="card__edge" aria-hidden="true"></div>

      <!-- Card image -->
      <div class="card__image">
        <img [src]="p.image" [alt]="p.display_name" loading="lazy" />
      </div>

      <div class="card__row">
        <div class="card__left">
          <h2 class="card__title">{{ p.display_name }}</h2>

          <div class="card__cta">
            Ver detalle <span class="arrow">→</span>
          </div>
        </div>
      </div>
    </button>
  </section>

</main>
