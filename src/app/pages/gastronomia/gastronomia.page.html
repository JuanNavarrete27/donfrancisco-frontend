<main class="gastro">

  <!-- BG FX sutil + premium -->
  <div class="bg" aria-hidden="true">
    <div class="orb a"></div>
    <div class="orb b"></div>
    <div class="steam s1"></div>
    <div class="steam s2"></div>
    <div class="grid"></div>
    <div class="grain"></div>
    <div class="shine"></div>
  </div>

  <header class="top">
    <a class="back" routerLink="/locales">← Volver</a>
    <span class="badge">Gastronomía</span>
  </header>

  <!-- HERO -->
  <section class="hero" [style.transform]="'translate3d('+mx+'px,'+my+'px,0)'">
    <div class="hero__text">
      <h1 class="title">Sabores que se sienten</h1>
      <p class="subtitle">
        Ocho propuestas con estética <b>premium café</b>.
        Bajá y descubrí cada local: aparecen con una entrada suave y cinematográfica.
      </p>
    </div>
  </section>

  <!-- LISTA FULL WIDTH -->
  <section class="list" *ngIf="locales.length > 0" aria-label="Locales gastronómicos">
    <button
      #cardEl
      class="card"
      type="button"
      *ngFor="let l of locales; let i = index"
      (click)="abrir(l)"
      [style.--d]="'0.' + (i+1) + 's'"
    >
      <div class="card__fx" aria-hidden="true"></div>
      <div class="card__sweep" aria-hidden="true"></div>

      <!-- Cover Image -->
      <div class="card__image" aria-hidden="true">
        <img [src]="l.image" [alt]="l.display_name" loading="lazy" />
        <div class="card__image-overlay"></div>
      </div>

      <div class="card__row">
        <div class="card__left">
          <h2 class="card__title">{{ l.display_name }}</h2>

          <div class="card__cta">
            Ver detalle <span class="arrow">→</span>
          </div>
        </div>
      </div>
    </button>
  </section>

</main>
